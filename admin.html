<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StickerZone — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --accent: #7c3aed;
      --text: #f0f0f8;
      --text-muted: #8888aa;
      --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    /* LOGIN */
    .login-box { background: var(--surface); border: 1px solid rgba(124,58,237,0.3); border-radius: var(--radius); padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; }
    .login-box h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; }
    .login-input { width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 12px 20px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; margin-bottom: 16px; text-align: center; }
    .login-btn { width: 100%; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border: none; padding: 13px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.3s; }
    .login-btn:hover { transform: scale(1.03); }

    /* ADMIN PANEL */
    .admin-panel { display: none; width: 100%; max-width: 600px; }
    .admin-header { text-align: center; margin-bottom: 32px; }
    .admin-header h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-header p { color: var(--text-muted); font-size: 0.88rem; margin-top: 6px; }

    .form-box { background: var(--surface); border: 1px solid rgba(124,58,237,0.3); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
    .form-box h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #a78bfa; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 11px 16px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group select:focus { border-color: rgba(124,58,237,0.6); }
    .form-group select option { background: #1c1c27; }

    .preview-img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; margin-top: 8px; display: none; background: var(--surface2); }
    .preview-emoji { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-top: 8px; }

    .btn-add-pack { width: 100%; background: linear-gradient(135deg, #25d366, #128c7e); color: #fff; border: none; padding: 14px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; margin-top: 8px; }
    .btn-add-pack:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(37,211,102,0.4); }
    .btn-add-pack:disabled { opacity: 0.6; cursor: not-allowed; }

    .status-msg { text-align: center; margin-top: 12px; font-size: 0.88rem; min-height: 20px; }
    .status-msg.success { color: #25d366; }
    .status-msg.error { color: #ef4444; }
    .status-msg.loading { color: #a78bfa; }

    /* PACK LIST */
    .packs-list { background: var(--surface); border: 1px solid rgba(124,58,237,0.3); border-radius: var(--radius); padding: 28px; }
    .packs-list h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: #a78bfa; }
    .pack-item { background: var(--surface2); border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .pack-item-emoji { font-size: 1.8rem; }
    .pack-item-img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
    .pack-item-info { flex: 1; }
    .pack-item-name { font-weight: 600; font-size: 0.95rem; }
    .pack-item-meta { font-size: 0.78rem; color: var(--text-muted); }
    .pack-item-delete { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: background 0.3s; }
    .pack-item-delete:hover { background: rgba(239,68,68,0.3); }
    .pack-item-edit { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: background 0.3s; margin-right: 6px; }
    .pack-item-edit:hover { background: rgba(124,58,237,0.3); }
    .pack-item-actions { display: flex; gap: 6px; }
    .empty-msg { text-align: center; color: var(--text-muted); font-size: 0.88rem; padding: 20px; }

    .btn-logout { display: block; margin: 16px auto 0; background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 8px 24px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
    .btn-logout:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-box" id="login-box">
    <h1>🌀 Admin</h1>
    <p>Entrez le mot de passe pour accéder au panneau d'administration</p>
    <input type="password" class="login-input" id="password-input" placeholder="Mot de passe secret"/>
    <button class="login-btn" onclick="login()">🔓 Connexion</button>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <h1>🌀 StickerZone Admin</h1>
      <p>Ajoute et gère tes packs de stickers</p>
    </div>

    <!-- FORMULAIRE -->
    <div class="form-box">
      <h2>➕ Ajouter un pack</h2>

      <div class="form-group">
        <label>Nom du pack</label>
        <input type="text" id="f-nom" placeholder="ex: 3D Emoji"/>
      </div>

      <div class="form-group">
        <label>Image URL (optionnel)</label>
        <input type="text" id="f-image" placeholder="https://..." oninput="previewImage()"/>
        <img id="preview-img" class="preview-img"/>
      </div>

      <div class="form-group">
        <label>Emoji (si pas d'image)</label>
        <input type="text" id="f-emoji" placeholder="😎" maxlength="2"/>
      </div>

      <div class="form-group">
        <label>Nombre de stickers</label>
        <input type="number" id="f-stickers" placeholder="17"/>
      </div>

      <div class="form-group">
        <label>Taille du pack</label>
        <input type="text" id="f-taille" placeholder="3.9 MB"/>
      </div>

      <div class="form-group">
        <label>Lien WhatsApp</label>
        <input type="text" id="f-lien" placeholder="https://whatsapp.com/channel/..."/>
      </div>

      <div class="form-group">
        <label>Badge</label>
        <select id="f-badge">
          <option value="">Aucun</option>
          <option value="Populaire">Populaire</option>
          <option value="Nouveau">Nouveau</option>
        </select>
      </div>

      <button class="btn-add-pack" id="btn-add" onclick="ajouterPack()">✅ Ajouter le pack</button>
      <div class="status-msg" id="status-msg"></div>
    </div>

    <!-- LISTE DES PACKS -->
    <div class="packs-list">
      <h2>📦 Packs existants</h2>
      <div id="packs-list-container"><div class="empty-msg">Chargement...</div></div>
    </div>

    <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
  </div>

  <script>
    const BIN_ID = '69e86197856a6821895ce78a';
    const MASTER_KEY = '$2a$10$a5RloqbsNDWK5G9sbWl6BuegdvgHPCVOI0stxKK0DcWnUSJ5nX83i';
    const PASSWORD = 'stickerzone2025'; // 👈 TON MOT DE PASSE SECRET — change-le !
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    function login() {
      const pwd = document.getElementById('password-input').value;
      if (pwd === PASSWORD) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        chargerPacks();
      } else {
        alert('❌ Mot de passe incorrect !');
      }
    }

    function logout() {
      document.getElementById('login-box').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('password-input').value = '';
    }

    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function previewImage() {
      const url = document.getElementById('f-image').value;
      const img = document.getElementById('preview-img');
      if (url) { img.src = url; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
    }

    async function chargerPacks() {
      try {
        const res = await fetch(API_URL + '/latest', {
          headers: { 'X-Master-Key': MASTER_KEY }
        });
        const data = await res.json();
        const packs = data.record || [];
        afficherPacks(packs);
      } catch (e) {
        document.getElementById('packs-list-container').innerHTML = '<div class="empty-msg">Erreur de chargement.</div>';
      }
    }

    function afficherPacks(packs) {
      const container = document.getElementById('packs-list-container');
      if (!packs.length) {
        container.innerHTML = '<div class="empty-msg">Aucun pack pour le moment.</div>';
        return;
      }
      container.innerHTML = packs.map((pack, i) => `
        <div class="pack-item">
          ${pack.image
            ? `<img class="pack-item-img" src="${pack.image}" alt="${pack.nom}">`
            : `<span class="pack-item-emoji">${pack.emoji || '📦'}</span>`
          }
          <div class="pack-item-info">
            <div class="pack-item-name">${pack.nom}</div>
            <div class="pack-item-meta">📦 ${pack.stickers} stickers • ⚖️ ${pack.taille} ${pack.badge ? '• 🏷️ ' + pack.badge : ''}</div>
          </div>
          <div class="pack-item-actions">
            <button class="pack-item-edit" onclick="modifierPack(${i})">✏️</button>
            <button class="pack-item-delete" onclick="supprimerPack(${i})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    async function ajouterPack() {
      const btn = document.getElementById('btn-add');
      const status = document.getElementById('status-msg');

      const nom = document.getElementById('f-nom').value.trim();
      const image = document.getElementById('f-image').value.trim();
      const emoji = document.getElementById('f-emoji').value.trim();
      const stickers = parseInt(document.getElementById('f-stickers').value) || 0;
      const taille = document.getElementById('f-taille').value.trim() || '- MB';
      const lien = document.getElementById('f-lien').value.trim() || '#';
      const badge = document.getElementById('f-badge').value;

      if (!nom) { status.className = 'status-msg error'; status.textContent = '❌ Le nom est obligatoire !'; return; }

      btn.disabled = true;
      status.className = 'status-msg loading';
      status.textContent = '⏳ Ajout en cours...';

      try {
        // Charger les packs existants
        const res = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const packs = data.record || [];

        // Ajouter le nouveau pack
        packs.push({ nom, image, emoji: emoji || '📦', stickers, taille, lien, badge });

        // Sauvegarder
        await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
          body: JSON.stringify(packs)
        });

        status.className = 'status-msg success';
        status.textContent = `✅ Pack "${nom}" ajouté avec succès !`;

        // Reset formulaire
        ['f-nom','f-image','f-emoji','f-stickers','f-taille','f-lien'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-badge').value = '';
        document.getElementById('preview-img').style.display = 'none';

        chargerPacks();
      } catch (e) {
        status.className = 'status-msg error';
        status.textContent = '❌ Erreur lors de l\'ajout.';
      }

      btn.disabled = false;
    }

    async function modifierPack(index) {
      const res = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
      const data = await res.json();
      const packs = data.record || [];
      const pack = packs[index];

      // Remplir le formulaire avec les données du pack
      document.getElementById('f-nom').value = pack.nom || '';
      document.getElementById('f-image').value = pack.image || '';
      document.getElementById('f-emoji').value = pack.emoji || '';
      document.getElementById('f-stickers').value = pack.stickers || '';
      document.getElementById('f-taille').value = pack.taille || '';
      document.getElementById('f-lien').value = pack.lien || '';
      document.getElementById('f-badge').value = pack.badge || '';
      previewImage();

      // Changer le bouton en mode modification
      const btn = document.getElementById('btn-add');
      btn.textContent = '💾 Modifier le pack';
      btn.style.background = 'linear-gradient(135deg, #f59e0b, #ef4444)';
      btn.onclick = async () => {
        await supprimerPack(index, true);
        btn.textContent = '✅ Ajouter le pack';
        btn.style.background = '';
        btn.onclick = ajouterPack;
        await ajouterPack();
      };

      // Scroll vers le formulaire
      document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });
      document.getElementById('status-msg').className = 'status-msg loading';
      document.getElementById('status-msg').textContent = '✏️ Mode modification activé !';
    }

    async function supprimerPack(index, silencieux = false) {
      if (!silencieux && !confirm('Supprimer ce pack ?')) return;
      try {
        const res = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
        const data = await res.json();
        const packs = data.record || [];
        packs.splice(index, 1);
        await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
          body: JSON.stringify(packs)
        });
        chargerPacks();
      } catch (e) { alert('Erreur lors de la suppression.'); }
    }
  </script>
</body>
</html>
