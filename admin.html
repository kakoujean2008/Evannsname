<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Evanns Name</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#050507; --dark:#0d0d10; --panel:#111115;
      --border:#1e1e24; --gold:#c9a84c; --gold2:#f0d080;
      --silver:#a0a0b0; --white:#f4f2ee; --red:#e05050;
      --radius:12px;
    }
    body { background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh; }

    /* LOGIN */
    #loginScreen { min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px; }
    .login-box { background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:380px;text-align:center; }
    .login-title { font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.15em;color:var(--gold);margin-bottom:8px; }
    .login-sub { font-size:.75rem;color:var(--silver);letter-spacing:.1em;margin-bottom:32px;opacity:.6; }
    .login-input { width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);color:var(--white);font-family:'DM Sans',sans-serif;font-size:1rem;padding:14px 18px;outline:none;text-align:center;letter-spacing:.2em;transition:border-color .3s; }
    .login-input:focus { border-color:rgba(201,168,76,.5); }
    .login-btn { width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#b8922a,var(--gold));border:none;border-radius:var(--radius);color:#0d0a05;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.2em;cursor:pointer;transition:opacity .2s; }
    .login-btn:hover { opacity:.85; }
    .login-err { color:var(--red);font-size:.8rem;margin-top:10px;display:none; }

    /* ADMIN */
    #adminScreen { display:none;padding:40px 24px;max-width:1100px;margin:0 auto; }
    .admin-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:40px; }
    .admin-title { font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.12em;color:var(--gold); }
    .admin-title span { color:var(--white); }
    .logout-btn { padding:8px 20px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--silver);font-size:.75rem;letter-spacing:.1em;cursor:pointer;transition:all .2s; }
    .logout-btn:hover { border-color:var(--red);color:var(--red); }

    /* UPLOAD */
    .upload-card { background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:40px;position:relative; }
    .upload-card::before { content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .card-title { font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.15em;color:var(--gold);margin-bottom:24px; }

    .drop-zone { border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:20px;position:relative; }
    .drop-zone:hover,.drop-zone.drag { border-color:var(--gold);background:rgba(201,168,76,.04); }
    .drop-zone input { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
    .drop-icon { font-size:2.5rem;margin-bottom:12px; }
    .drop-text { font-size:.85rem;color:var(--silver);line-height:1.7; }
    .drop-text strong { color:var(--gold); }

    .preview-wrap { display:none;margin-bottom:20px;text-align:center; }
    .preview-wrap img { max-height:200px;border-radius:10px;border:1px solid var(--border); }

    .field-row { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px; }
    @media(max-width:600px){ .field-row{grid-template-columns:1fr;} }
    .field-label { display:block;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px; }
    .field-input { width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:12px 16px;outline:none;transition:border-color .3s; }
    .field-input:focus { border-color:rgba(201,168,76,.4); }

    .upload-btn { padding:14px 36px;background:linear-gradient(135deg,#b8922a,var(--gold));border:none;border-radius:var(--radius);color:#0d0a05;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.18em;cursor:pointer;transition:opacity .2s; }
    .upload-btn:hover { opacity:.85; }
    .upload-btn:disabled { opacity:.5;cursor:not-allowed; }

    .upload-msg { margin-top:12px;font-size:.82rem;display:none; }
    .upload-msg.ok  { color:#60e080;display:block; }
    .upload-msg.err { color:var(--red);display:block; }

    /* GALERIE */
    .gallery-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
    .gallery-title { font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.15em;color:var(--gold); }
    .gallery-count { font-size:.72rem;color:var(--silver);opacity:.6; }

    .gallery-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px; }
    .gallery-item { background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s; }
    .gallery-item:hover { border-color:rgba(201,168,76,.3); }
    .gallery-img { aspect-ratio:16/9;overflow:hidden; }
    .gallery-img img { width:100%;height:100%;object-fit:cover;display:block; }
    .gallery-info { padding:12px; }
    .gallery-name { font-size:.82rem;font-weight:500;color:var(--white);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .gallery-tags { font-size:.68rem;color:var(--silver);opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .gallery-del { width:100%;margin-top:10px;padding:8px;background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.2);border-radius:8px;color:var(--red);font-size:.72rem;letter-spacing:.1em;cursor:pointer;transition:all .2s; }
    .gallery-del:hover { background:rgba(200,50,50,.15); }

    .gallery-empty { color:var(--silver);font-size:.85rem;font-style:italic;opacity:.5;padding:40px;text-align:center; }

    .view-site-btn { padding:10px 24px;background:transparent;border:1px solid var(--gold);border-radius:var(--radius);color:var(--gold);font-size:.75rem;letter-spacing:.12em;cursor:pointer;text-decoration:none;transition:all .2s; }
    .view-site-btn:hover { background:rgba(201,168,76,.1); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">Admin</div>
    <p class="login-sub">EVANNS NAME · ACCÈS RÉSERVÉ</p>
    <input type="password" id="passwordInput" class="login-input" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" onclick="login()">Connexion</button>
    <p class="login-err" id="loginErr">Mot de passe incorrect.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-title">Evanns<span>Name</span> — Admin</div>
    <div style="display:flex;gap:12px;align-items:center;">
      <a href="/" class="view-site-btn">Voir le site →</a>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="upload-card">
    <div class="card-title">✦ Ajouter un fond</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" onchange="previewFile(this)"/>
      <div class="drop-icon">🖼️</div>
      <p class="drop-text">
        <strong>Clique ou glisse</strong> une image ici<br>
        JPG, PNG, WEBP · Max 10MB
      </p>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Aperçu"/>
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Nom du fond</label>
        <input type="text" id="uploadLabel" class="field-input" placeholder="Ex : Galaxie violette"/>
      </div>
      <div>
        <label class="field-label">Tags style (pour l'IA)</label>
        <input type="text" id="uploadTags" class="field-input" placeholder="Ex : dark, space, purple, neon"/>
      </div>
    </div>
    <div>
      <label class="field-label">Description visuelle (pour l'IA)</label>
      <input type="text" id="uploadDesc" class="field-input" placeholder="Ex : nébuleuse violette avec étoiles dorées, atmosphère sombre et mystérieuse"/>
    </div>

    <div style="margin-top:20px;">
      <button class="upload-btn" id="uploadBtn" onclick="uploadSample()">✦ Publier le fond</button>
    </div>
    <p class="upload-msg" id="uploadMsg"></p>
  </div>

  <!-- GALERIE -->
  <div>
    <div class="gallery-header">
      <div class="gallery-title">✦ Fonds publiés</div>
      <div class="gallery-count" id="galleryCount"></div>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-empty">Chargement…</div>
    </div>
  </div>
</div>

<script>
let adminPassword = '';

// ── LOGIN ───────────────────────────────────────────────────────
async function login(){
  const pwd = document.getElementById('passwordInput').value;
  const res = await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
  const data = await res.json();
  if(data.ok){
    adminPassword = pwd;
    sessionStorage.setItem('adminPwd', pwd);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    loadGallery();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
function logout(){
  sessionStorage.removeItem('adminPwd');
  adminPassword='';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('passwordInput').value='';
}
// Auto-login si session active
const savedPwd = sessionStorage.getItem('adminPwd');
if(savedPwd){
  document.getElementById('passwordInput').value = savedPwd;
  login();
}
document.getElementById('passwordInput').addEventListener('keydown',e=>{ if(e.key==='Enter')login(); });

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag'); const f=e.dataTransfer.files[0]; if(f){ document.getElementById('fileInput').files=e.dataTransfer.files; previewFile({files:e.dataTransfer.files}); } });

// ── PREVIEW ─────────────────────────────────────────────────────
function previewFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewWrap').style.display='block';
  };
  reader.readAsDataURL(file);
  // Auto-remplir le nom
  if(!document.getElementById('uploadLabel').value){
    document.getElementById('uploadLabel').value = file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  }
}

// ── UPLOAD ──────────────────────────────────────────────────────
async function uploadSample(){
  const file  = document.getElementById('fileInput').files[0];
  const label = document.getElementById('uploadLabel').value.trim();
  const tags  = document.getElementById('uploadTags').value.trim();
  const desc  = document.getElementById('uploadDesc').value.trim();
  const msg   = document.getElementById('uploadMsg');
  const btn   = document.getElementById('uploadBtn');

  if(!file){ showMsg('Sélectionne une image d\'abord.','err'); return; }

  const fd = new FormData();
  fd.append('image', file);
  fd.append('label', label || file.name);
  fd.append('tags',  tags);
  fd.append('description', desc);

  btn.disabled=true; btn.textContent='Envoi en cours…';
  msg.className='upload-msg'; msg.style.display='none';

  try {
    const res  = await fetch('/api/admin/upload',{method:'POST',headers:{'x-admin-password':adminPassword},body:fd});
    const data = await res.json();
    if(data.success){
      showMsg('✓ Fond publié avec succès !','ok');
      document.getElementById('fileInput').value='';
      document.getElementById('uploadLabel').value='';
      document.getElementById('uploadTags').value='';
      document.getElementById('uploadDesc').value='';
      document.getElementById('previewWrap').style.display='none';
      loadGallery();
    } else {
      showMsg(data.error||'Erreur lors de l\'upload.','err');
    }
  } catch {
    showMsg('Erreur réseau. Réessaie.','err');
  }
  btn.disabled=false; btn.textContent='✦ Publier le fond';
}

function showMsg(text, type){
  const msg = document.getElementById('uploadMsg');
  msg.textContent=text; msg.className=`upload-msg ${type}`;
}

// ── GALERIE ─────────────────────────────────────────────────────
async function loadGallery(){
  const grid = document.getElementById('galleryGrid');
  const count = document.getElementById('galleryCount');
  grid.innerHTML='<div class="gallery-empty">Chargement…</div>';
  try {
    const res     = await fetch('/api/samples');
    const samples = await res.json();
    count.textContent = `${samples.length} fond${samples.length>1?'s':''}`;
    if(!samples.length){ grid.innerHTML='<div class="gallery-empty">Aucun fond publié pour l\'instant.</div>'; return; }
    grid.innerHTML='';
    samples.forEach(s=>{
      const el = document.createElement('div');
      el.className='gallery-item';
      el.innerHTML=`
        <div class="gallery-img"><img src="${s.url}" alt="${s.label||''}" loading="lazy"/></div>
        <div class="gallery-info">
          <div class="gallery-name">${s.label||'Sans titre'}</div>
          <div class="gallery-tags">${s.tags||'—'}</div>
          <button class="gallery-del" onclick="deleteSample('${s.filename}',this)">🗑 Supprimer</button>
        </div>`;
      grid.appendChild(el);
    });
  } catch {
    grid.innerHTML='<div class="gallery-empty">Erreur de chargement.</div>';
  }
}

async function deleteSample(filename, btn){
  if(!confirm('Supprimer ce fond ?')) return;
  btn.disabled=true; btn.textContent='Suppression…';
  try {
    await fetch(`/api/admin/samples/${filename}`,{method:'DELETE',headers:{'x-admin-password':adminPassword}});
    loadGallery();
  } catch {
    btn.disabled=false; btn.textContent='🗑 Supprimer';
  }
}
</script>
</body>
</html>
